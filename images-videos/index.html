<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bolalar uchun videolar</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #e6f7ff, #fff7dc);
      color: #1f2937;
    }

    .page {
      width: min(100vw, 480px);
      margin: 0 auto;
      min-height: 100vh;
      padding: 18px 16px 28px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .round-button {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 0;
      background: linear-gradient(#ffcf4d, #ff9f1c);
      box-shadow: 0 5px 0 #b86b00;
      font-size: 24px;
      cursor: pointer;
    }

    .hero {
      padding: 22px 18px;
      border-radius: 30px;
      background: linear-gradient(135deg, #56ccf2, #2f80ed);
      color: white;
      text-align: center;
      box-shadow: 0 10px 24px rgba(47,128,237,.28);
      border: 4px solid rgba(255,255,255,.75);
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
      font-weight: 1000;
      text-shadow: 0 3px 0 rgba(0,0,0,.18);
    }

    .hero p {
      margin: 8px 0 0;
      font-size: 17px;
      font-weight: 800;
      opacity: .96;
    }

    .video-list {
      display: grid;
      gap: 16px;
    }

    .video-card {
      width: 100%;
      border: 0;
      padding: 0;
      border-radius: 28px;
      overflow: hidden;
      text-align: left;
      background: white;
      cursor: pointer;
      box-shadow: 0 8px 0 rgba(0,0,0,.12), 0 18px 30px rgba(0,0,0,.10);
      transition: transform .15s ease;
    }

    .video-card:active { transform: scale(.98); }

    .thumb-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      overflow: hidden;
      background: #dbeafe;
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .play-badge {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(255,255,255,.92);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      box-shadow: 0 8px 22px rgba(0,0,0,.24);
    }

    .card-content {
      padding: 14px 16px 16px;
    }

    .card-title {
      font-size: 21px;
      font-weight: 1000;
      margin: 0 0 4px;
      color: #111827;
    }

    .card-desc {
      margin: 0;
      color: #4b5563;
      font-size: 15px;
      line-height: 1.35;
      font-weight: 700;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(0,0,0,.75);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .modal.open { display: flex; }

    .modal-card {
      width: min(100%, 760px);
      background: white;
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 22px 50px rgba(0,0,0,.35);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      background: #fff7dc;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 1000;
      color: #1f2937;
    }

    .close-button {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 0;
      background: #ef4444;
      color: white;
      font-size: 22px;
      font-weight: 1000;
      cursor: pointer;
    }

    video,
    iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      border: 0;
      background: #111827;
    }

    .footer-link {
      display: block;
      margin-top: 18px;
      width: 100%;
      text-align: center;
      text-decoration: none;
      border-radius: 20px;
      padding: 15px 16px;
      background: linear-gradient(#8b5cf6, #5b21b6);
      color: white;
      font-size: 18px;
      font-weight: 1000;
      box-shadow: 0 6px 0 #3b1682;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="top-bar">
      <button class="round-button" onclick="goToGame()" aria-label="O‘yinlar">🎮</button>
      <button class="round-button" onclick="window.scrollTo({ top: 0, behavior: 'smooth' })" aria-label="Yuqoriga">⬆️</button>
    </div>

    <section class="hero">
      <h1>Foydali odatlar</h1>
      <p>Rasmni bosing va videoni ko‘ring 🎬</p>
    </section>

    <section class="video-list" id="videoList"></section>

    <a class="footer-link" href="../">Matematika o‘yinlariga qaytish 🚀</a>
  </main>

  <div class="modal" id="videoModal" onclick="closeVideo(event)">
    <div class="modal-card" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Video</div>
        <button class="close-button" onclick="closeVideo()">×</button>
      </div>
      <div id="videoContainer"></div>
    </div>
  </div>

  <script>
    // IMPORTANT:
    // 1. Create a folder named "videos" in your GitHub repo.
    // 2. Create this file as videos/index.html.
    // 3. Upload your images into videos/images/.
    // 4. Replace videoUrl values with your real video links.

    const videos = [
      {
        title: 'Yordam beramiz',
        description: 'Dada bilan birga foydali ish qilishni o‘rganamiz.',
        image: 'images/2026-05-05 20.34.33.jpg',
        videoUrl: 'videos/video.mp4'
      },
      {
        title: 'Sog‘lom odatlar',
        description: 'Qo‘l yuvish, ovqatlanish, uxlash, suv ichish va sport qilish.',
        image: 'images/2026-05-05 21.16.49.jpg',
        videoUrl: 'videos/video-2.mp4'
      },
      {
        title: 'Tozalikni saqlaymiz',
        description: 'Axlatni joyiga tashlash va atrofni toza tutish.',
        image: 'images/2026-05-05 21.40.50.jpg',
        videoUrl: 'videos/video.mp4'
      },
      {
        title: 'Gul ekamiz',
        description: 'Oila bilan bog‘da gul ekish va parvarish qilish.',
        image: 'images/2026-05-05 21.41.05.jpg',
        videoUrl: 'videos/video-2.mp4'
      },
      {
        title: 'Idish yuvamiz',
        description: 'Uy ishlarida yordam berish yaxshi odat.',
        image: 'images/2026-05-05 21.41.12.jpg',
        videoUrl: 'videos/video.mp4'
      }
    ];

    const videoList = document.getElementById('videoList');
    const modal = document.getElementById('videoModal');
    const modalTitle = document.getElementById('modalTitle');
    const videoContainer = document.getElementById('videoContainer');

    function renderVideos() {
      videoList.innerHTML = videos.map((item, index) => `
        <button class="video-card" onclick="openVideo(${index})">
          <div class="thumb-wrap">
            <img src="${item.image}" alt="${item.title}" />
            <div class="play-badge">▶️</div>
          </div>
          <div class="card-content">
            <h2 class="card-title">${item.title}</h2>
            <p class="card-desc">${item.description}</p>
          </div>
        </button>
      `).join('');
    }

    function openVideo(index) {
      const item = videos[index];
      modalTitle.textContent = item.title;

      if (item.videoUrl.includes('youtube.com/embed')) {
        videoContainer.innerHTML = `
          <iframe
            src="${item.videoUrl}?autoplay=1&rel=0"
            title="${item.title}"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
          </iframe>
        `;
      } else {
        videoContainer.innerHTML = `
          <video controls autoplay playsinline>
            <source src="${item.videoUrl}" type="video/mp4" />
            Brauzeringiz video ko‘rsatishni qo‘llab-quvvatlamaydi.
          </video>
        `;
      }

      modal.classList.add('open');
    }

    function closeVideo() {
      modal.classList.remove('open');
      videoContainer.innerHTML = '';
    }

    function goToGame() {
      window.location.href = '../';
    }

    renderVideos();
  </script>
</body>
</html>
