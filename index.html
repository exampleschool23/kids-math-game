<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kosmik Matematika O‘yini</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #2835a8, #08123f 70%);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      overflow-x: hidden;
    }

    .game {
      width: min(100vw, 430px);
      min-height: 100vh;
      padding: 18px 16px 22px;
      position: relative;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(#fff 1px, transparent 1px),
        radial-gradient(#ffd84d 1.5px, transparent 1.5px),
        radial-gradient(#8ee8ff 1px, transparent 1px);
      background-size: 44px 44px, 72px 72px, 95px 95px;
      opacity: 0.45;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .circle-button {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 0;
      background: linear-gradient(#a65cff, #6325c9);
      color: white;
      font-size: 24px;
      box-shadow: 0 6px 0 #37117f, 0 10px 20px rgba(0,0,0,.28);
    }

    .question-card {
      text-align: center;
      padding: 18px 14px;
      border-radius: 28px;
      background: linear-gradient(180deg, #7b3cff, #3d168f);
      box-shadow: inset 0 4px 0 rgba(255,255,255,.24), 0 10px 20px rgba(0,0,0,.25);
      margin-bottom: 18px;
    }

    .question-label {
      font-weight: 800;
      font-size: 20px;
      opacity: .95;
    }

    .question {
      margin-top: 4px;
      font-size: 58px;
      font-weight: 1000;
      color: #ffd93d;
      text-shadow: 0 4px 0 #a16100;
      line-height: 1;
    }

    .section-title {
      font-weight: 900;
      margin: 14px 2px 10px;
      font-size: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .equation-card,
    .answer-card {
      border: 3px solid rgba(255,255,255,.8);
      border-radius: 20px;
      min-height: 92px;
      font-size: 34px;
      font-weight: 1000;
      cursor: pointer;
      user-select: none;
      transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
      touch-action: manipulation;
    }

    .equation-card {
      background: white;
      color: #130946;
      box-shadow: 0 6px 0 rgba(0,0,0,.18);
    }

    .answer-card {
      background:
        radial-gradient(circle at 75% 35%, rgba(255,180,30,.95) 0 18%, transparent 19%),
        radial-gradient(circle at 30% 70%, rgba(70,190,255,.85) 0 15%, transparent 16%),
        linear-gradient(135deg, #32106f, #06194e);
      color: white;
      text-shadow: 0 4px 0 rgba(0,0,0,.3);
      min-height: 80px;
      box-shadow: 0 6px 0 rgba(0,0,0,.24);
    }

    .equation-card:active,
    .answer-card:active {
      transform: scale(.96);
    }

    .selected-question {
      border-color: #6eff3d;
      box-shadow: 0 0 0 5px rgba(110,255,61,.35), 0 0 24px rgba(110,255,61,.75);
    }

    .correct {
      border-color: #58ff32;
      box-shadow: 0 0 0 5px rgba(88,255,50,.35), 0 0 24px rgba(88,255,50,.85);
      animation: pop .35s ease;
    }

    .wrong {
      border-color: #ff3d4d;
      box-shadow: 0 0 0 5px rgba(255,61,77,.35), 0 0 24px rgba(255,61,77,.8);
      animation: shake .35s ease;
    }

    .feedback {
      margin: 14px 0;
      min-height: 58px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 24px;
      font-weight: 1000;
      padding: 10px 14px;
      box-shadow: inset 0 3px 0 rgba(255,255,255,.26), 0 7px 0 rgba(0,0,0,.18);
    }

    .feedback.info { background: linear-gradient(#396cff, #1832ad); }
    .feedback.success { background: linear-gradient(#53d91d, #209508); }
    .feedback.error { background: linear-gradient(#ff705c, #cf1b25); }

    .bottom {
      margin-top: 18px;
      background: rgba(255,255,255,.12);
      border: 2px solid rgba(255,255,255,.18);
      border-radius: 24px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress-wrap { flex: 1; }

    .progress-label {
      font-weight: 800;
      margin-bottom: 6px;
      font-size: 14px;
      opacity: .95;
    }

    .progress-bg {
      height: 18px;
      border-radius: 20px;
      background: rgba(0,0,0,.32);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #73ff31, #ffe44a);
      border-radius: 20px;
      transition: width .3s ease;
    }

    .score {
      font-size: 22px;
      font-weight: 1000;
      white-space: nowrap;
    }

    .reset {
      margin-top: 14px;
      width: 100%;
      height: 50px;
      border: 0;
      border-radius: 18px;
      background: linear-gradient(#ffe76b, #ffb500);
      color: #4a2600;
      font-size: 18px;
      font-weight: 1000;
      box-shadow: 0 6px 0 #9e6500;
    }

    .fireworks-canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 19;
      pointer-events: none;
    }

    .celebration {
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: celebrationFade .95s ease forwards;
    }

    .hooray-card {
      min-width: 260px;
      padding: 24px 22px;
      border-radius: 32px;
      text-align: center;
      background: linear-gradient(180deg, #fff176, #ffb300);
      color: #5a2900;
      border: 5px solid white;
      box-shadow: 0 18px 40px rgba(0,0,0,.35);
      animation: hoorayPop .95s ease forwards;
    }

    .hooray-title {
      font-size: 46px;
      font-weight: 1000;
      line-height: 1;
      text-shadow: 0 3px 0 rgba(255,255,255,.55);
    }

    .hooray-subtitle {
      margin-top: 8px;
      font-size: 24px;
      font-weight: 1000;
    }

    .confetti-piece {
      position: fixed;
      z-index: 21;
      top: -30px;
      font-size: 28px;
      pointer-events: none;
      animation: confettiFall 1.25s ease-out forwards;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes celebrationFade {
      0% { opacity: 0; }
      12% { opacity: 1; }
      78% { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes hoorayPop {
      0% { transform: scale(.45) rotate(-8deg); }
      35% { transform: scale(1.12) rotate(4deg); }
      65% { transform: scale(.98) rotate(-2deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    @keyframes confettiFall {
      0% { transform: translateY(-40px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(520deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="stars"></div>

  <main class="game">
    <div class="top-bar">
      <button class="circle-button" aria-label="Bosh sahifa">🏠</button>
      <button class="circle-button" aria-label="Ovoz">🔊</button>
    </div>

    <section class="question-card">
      <div class="question-label">Misolni yeching</div>
      <div id="currentQuestion" class="question">6+5</div>
    </section>

    <div class="section-title">1. Misolni tanlang</div>
    <section id="equations" class="grid"></section>

    <div id="feedback" class="feedback info">6+5 ni tanlang, keyin 11 ni bosing 🚀</div>

    <div class="section-title">2. To‘g‘ri javobni tanlang</div>
    <section id="answers" class="grid"></section>

    <section class="bottom">
      <div class="progress-wrap">
        <div class="progress-label">Natija</div>
        <div class="progress-bg"><div id="progressFill" class="progress-fill"></div></div>
      </div>
      <div id="score" class="score">0 / 9</div>
    </section>

    <button class="reset" onclick="resetGame()">Qayta o‘ynash</button>
  </main>

  <script>
    const questions = [
      { text: '3+4', answer: 7 },
      { text: '4+4', answer: 8 },
      { text: '4+5', answer: 9 },
      { text: '5+5', answer: 10 },
      { text: '6+5', answer: 11 },
      { text: '7+5', answer: 12 },
      { text: '8+5', answer: 13 },
      { text: '9+5', answer: 14 },
      { text: '10+5', answer: 15 }
    ];

    const answers = [13, 11, 15, 7, 14, 9, 10, 8, 12];
    let currentIndex = 4;
    let selectedQuestion = null;
    let solved = new Set();
    let canAnswer = false;

    const equationsEl = document.getElementById('equations');
    const answersEl = document.getElementById('answers');
    const feedbackEl = document.getElementById('feedback');
    const currentQuestionEl = document.getElementById('currentQuestion');
    const progressFillEl = document.getElementById('progressFill');
    const scoreEl = document.getElementById('score');

    function render() {
      const current = questions[currentIndex];
      currentQuestionEl.textContent = current.text;

      equationsEl.innerHTML = '';
      questions.forEach((question, index) => {
        const button = document.createElement('button');
        button.className = 'equation-card';
        button.textContent = question.text;
        button.setAttribute('aria-label', `${question.text} misoli`);

        if (selectedQuestion === index) button.classList.add('selected-question');
        if (solved.has(index)) button.classList.add('correct');

        button.onclick = () => selectQuestion(index);
        equationsEl.appendChild(button);
      });

      answersEl.innerHTML = '';
      answers.forEach(answer => {
        const button = document.createElement('button');
        button.className = 'answer-card';
        button.textContent = answer;
        button.setAttribute('aria-label', `${answer} javobi`);
        button.onclick = () => selectAnswer(answer, button);
        answersEl.appendChild(button);
      });

      updateProgress();
    }

    function selectQuestion(index) {
      if (solved.has(index)) {
        showFeedback('success', 'Bu misol yechilgan ✅');
        return;
      }

      selectedQuestion = index;
      currentIndex = index;
      canAnswer = true;
      showFeedback('info', `Zo‘r! Endi ${questions[index].answer} javobini tanlang`);
      render();
    }

    function selectAnswer(answer, button) {
      if (!canAnswer || selectedQuestion === null) {
        showFeedback('error', 'Avval misolni tanlang 👆');
        button.classList.add('wrong');
        setTimeout(() => button.classList.remove('wrong'), 450);
        return;
      }

      const current = questions[selectedQuestion];

      if (answer === current.answer) {
        button.classList.add('correct');
        solved.add(selectedQuestion);
        canAnswer = false;
        showFeedback('success', `Ajoyib! ${current.text} = ${answer} ✅`);
        showHoorayAnimation();

        setTimeout(() => {
          moveToNextQuestion();
          render();
        }, 900);
      } else {
        button.classList.add('wrong');
        showFeedback('error', 'Xato! Yana urinib ko‘ring ❌');
        setTimeout(() => button.classList.remove('wrong'), 500);
      }

      updateProgress();
    }

    function moveToNextQuestion() {
      const nextIndex = questions.findIndex((_, index) => !solved.has(index));
      if (nextIndex === -1) {
        selectedQuestion = null;
        showFeedback('success', 'Barakalla! Barcha misollar yechildi! 🌟');
        return;
      }

      selectedQuestion = nextIndex;
      currentIndex = nextIndex;
      canAnswer = true;
      showFeedback('info', `Keyingi misol: ${questions[nextIndex].text}. Javobni tanlang: ${questions[nextIndex].answer}`);
    }

    function showFeedback(type, text) {
      feedbackEl.className = `feedback ${type}`;
      feedbackEl.textContent = text;
    }

    function updateProgress() {
      const total = questions.length;
      const done = solved.size;
      progressFillEl.style.width = `${(done / total) * 100}%`;
      scoreEl.textContent = `${done} / ${total}`;
    }

    function showHoorayAnimation() {
      const canvas = document.createElement('canvas');
      canvas.className = 'fireworks-canvas';
      document.body.appendChild(canvas);

      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.scale(dpr, dpr);

      const celebration = document.createElement('div');
      celebration.className = 'celebration';
      celebration.innerHTML = `
        <div class="hooray-card">
          <div class="hooray-title">Uraaa! 🎆</div>
          <div class="hooray-subtitle">To‘g‘ri javob!</div>
        </div>
      `;
      document.body.appendChild(celebration);

      const particles = [];
      const colors = ['#ff3b5c', '#ffd93d', '#5cff6d', '#4dd8ff', '#b45cff', '#ffffff', '#ff8a00'];

      function createFirework(x, y) {
        const count = 42;
        for (let i = 0; i < count; i++) {
          const angle = (Math.PI * 2 * i) / count;
          const speed = 2.5 + Math.random() * 5.5;
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            decay: 0.012 + Math.random() * 0.014,
            size: 2 + Math.random() * 4,
            color: colors[Math.floor(Math.random() * colors.length)]
          });
        }
      }

      const bursts = [
        [window.innerWidth * 0.5, window.innerHeight * 0.32],
        [window.innerWidth * 0.22, window.innerHeight * 0.42],
        [window.innerWidth * 0.78, window.innerHeight * 0.42],
        [window.innerWidth * 0.35, window.innerHeight * 0.65],
        [window.innerWidth * 0.65, window.innerHeight * 0.65]
      ];

      bursts.forEach((point, index) => {
        setTimeout(() => createFirework(point[0], point[1]), index * 170);
      });

      let frame = 0;
      const fireworkInterval = setInterval(() => {
        createFirework(
          40 + Math.random() * (window.innerWidth - 80),
          100 + Math.random() * (window.innerHeight * 0.55)
        );
      }, 260);

      function animate() {
        frame++;
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        ctx.globalCompositeOperation = 'lighter';

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.035;
          p.vx *= 0.99;
          p.vy *= 0.99;
          p.life -= p.decay;

          ctx.globalAlpha = Math.max(p.life, 0);
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();

          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p.x - p.vx * 4, p.y - p.vy * 4);
          ctx.lineWidth = p.size / 2;
          ctx.strokeStyle = p.color;
          ctx.stroke();

          if (p.life <= 0) particles.splice(i, 1);
        }

        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = 'source-over';

        if (frame < 135 || particles.length > 0) {
          requestAnimationFrame(animate);
        }
      }

      animate();

      setTimeout(() => {
        clearInterval(fireworkInterval);
        celebration.remove();
      }, 1600);

      setTimeout(() => {
        canvas.remove();
      }, 3200);
    }

    function resetGame() {
      solved = new Set();
      currentIndex = 4;
      selectedQuestion = null;
      canAnswer = false;
      showFeedback('info', '6+5 ni tanlang, keyin 11 ni bosing 🚀');
      render();
    }

    render();
  </script>
</body>
</html>
